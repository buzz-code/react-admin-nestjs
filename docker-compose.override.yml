version: "3"
name: react-admin-nestjs-dev
services:
    client:
        container_name: ran-client-dev
        build:
            target: development
        environment:
            PORT: 3000
            REACT_APP_API_URL: http://localhost:3001
        ports:
            - "3000:3000"
        healthcheck:
            test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/"]
            interval: 10s
            timeout: 5s
            start_period: 60s
            retries: 3
        volumes:
            - ./client:/app
            - ./client/node_modules:/app/node_modules
        networks:
            - private-network

    server:
        container_name: ran-server-dev
        build:
            target: development
        command: sh -c "yarn build && ./node_modules/.bin/typeorm -d dist/shared/config/migration.config.js migration:run && yarn start:dev"
        ports:
            - "3001:3000"
        volumes:
            - ./server:/app
            - ./server/node_modules:/app/node_modules
        networks:
            - private-network

    database:
        container_name: ran-database-dev
        ports:
            - "3306:3306"

    phpmyadmin:
        container_name: ran-phpmyadmin-dev
        profiles: [tools]
        ports:
            - "8080:80"
        networks:
            - private-network

networks:
    private-network:
    caddy:
        external: false
    elknet:
        external: false
